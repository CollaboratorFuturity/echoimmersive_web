services:
  db:
    image: postgres:16-alpine
    container_name: echoimmersive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: echoimmersive
      POSTGRES_USER: echoimmersive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: echoimmersive-api
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    ports:
      - "8106:8000"

  echoimmersive-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echoimmersive-web
    restart: unless-stopped
    ports:
      - "8105:80"
    depends_on:
      - api

volumes:
  pgdata:
